name: Docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - ".github/workflows/docs.yml"
  pull_request:
    paths:
      - "docs/**"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

# Least privilege per job — `deploy` upgrades to id-token + pages:write below.
permissions:
  contents: read

# Cancel in-progress runs of this workflow when a new commit lands on the same
# ref (but let an in-progress deploy finish, since cancelling it can leave the
# Pages site in a half-deployed state).
concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  MDBOOK_VERSION: "0.4.40"

jobs:
  build:
    name: build (mdBook)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # configure-pages auto-enables Pages on first run; that needs write.
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v7

      - name: Install mdBook
        run: |
          mkdir -p "$HOME/.local/bin"
          curl -sSL "https://github.com/rust-lang/mdBook/releases/download/v${MDBOOK_VERSION}/mdbook-v${MDBOOK_VERSION}-x86_64-unknown-linux-gnu.tar.gz" \
            | tar -xz -C "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      # Auto-enable GitHub Pages (Source: GitHub Actions) on first run; sets
      # the base path so relative URLs resolve correctly under /<repo>/.
      # `enablement: true` flips Pages on via the API if it isn't already —
      # the default `false` only verifies it's enabled and errors otherwise.
      - name: Configure Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/configure-pages@v6
        with:
          enablement: true

      - name: Build
        run: mdbook build docs

      - name: Upload Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs/book

  deploy:
    # Only deploy from main; PRs only run the build for verification.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
