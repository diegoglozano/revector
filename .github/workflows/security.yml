name: Security

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Weekly, so newly-published advisories are caught even with no code change.
    - cron: "0 9 * * 1"

permissions:
  contents: read

jobs:
  cargo-deny:
    name: cargo-deny (advisories, licenses, bans, sources)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
