version: 2
updates:
  # Rust dependencies — picks up security patches and keeps Cargo.lock current.
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      # Qdrant is the framework's core dependency: keep its bumps in their own
      # PR (never batched) so the supported-version change is reviewed and the
      # README compatibility table + server pin get updated alongside it.
      qdrant:
        patterns:
          - "qdrant-client"
      # Batch routine bumps into one PR to cut noise; security updates still
      # come through promptly.
      cargo-minor:
        exclude-patterns:
          - "qdrant-client"
        update-types: ["minor", "patch"]

  # Keep GitHub Actions pinned versions current (and patched).
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
