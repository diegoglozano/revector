[workspace]
members = ["cargo:."]

# Config for 'dist'
[dist]
# The preferred dist version to use in CI (Cargo.toml SemVer syntax)
cargo-dist-version = "0.32.0"
# CI backends to support
ci = "github"
# The installers to generate for each app
installers = ["shell", "powershell", "homebrew"]
# Target platforms to build apps for (Rust target-triple syntax)
targets = ["aarch64-apple-darwin", "aarch64-unknown-linux-gnu", "x86_64-apple-darwin", "x86_64-unknown-linux-gnu", "x86_64-unknown-linux-musl", "x86_64-pc-windows-msvc"]
# Path that installers should place binaries in
install-path = "CARGO_HOME"
# Where to host releases
hosting = "github"
# Whether to install an updater program
install-updater = false

# --- Homebrew auto-publish (not yet enabled) ---------------------------------
# The Homebrew formula is generated and attached to each GitHub Release today.
# To make `brew install diegoglozano/tap/revector` work, create a public
# `diegoglozano/homebrew-tap` repo + a `HOMEBREW_TAP_TOKEN` repo secret (a PAT
# with `contents:write` on the tap), then uncomment:
# tap = "diegoglozano/homebrew-tap"
# publish-jobs = ["homebrew"]

